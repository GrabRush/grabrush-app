<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product - Grabrush</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .container { max-width: 780px; margin:40px auto; background:#fff; padding:28px 32px; border-radius:12px; box-shadow:0 4px 14px rgba(0,0,0,0.08); }
    h1 { margin-top:0; font-size:28px; }
    form { display:grid; gap:16px; }
    .row-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    label { font-weight:600; font-size:14px; display:flex; flex-direction:column; }
    input[type=text], input[type=number], input[type=datetime-local], input[type=file], textarea, select { margin-top:6px; padding:10px 12px; border-radius:8px; border:1px solid #ccc; font-size:14px; font-family:inherit; }
    textarea { resize:vertical; min-height:110px; }
    .actions { display:flex; gap:12px; }
    .btn { background:#4CAF50; color:#fff; border:none; padding:12px 22px; border-radius:8px; font-weight:600; cursor:pointer; }
    .btn.secondary { background:#555; }
    .statusBox { margin-top:12px; font-size:14px; }
    .hint { margin-top:6px; color:#666; font-size:12px; }
    .previewBox { border:1px dashed #ccc; border-radius:12px; padding:12px; background:#fafafa; }
    .previewBox img { display:none; width:100%; max-width:260px; max-height:200px; object-fit:cover; border-radius:10px; }
    .previewBox .empty { color:#777; font-size:13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Add New Product</h1>
    <div class="actions">
      <a href="/vendor/dashboard" class="btn secondary" style="text-decoration:none;display:inline-block;">Back to Dashboard</a>
    </div>
    <form id="productForm">
      <label>Product Image URL
        <input type="text" name="image_url" placeholder="https://..." />
      </label>
      <label>Upload Product Image
        <input type="file" name="image_file" id="image_file" accept="image/*" />
      </label>
      <div class="hint">You can provide a URL, upload an image file, or both. If both are provided, the uploaded file will be used.</div>
      <div class="previewBox">
        <div class="empty" id="previewEmpty">No image selected.</div>
        <img id="imagePreview" alt="Product image preview" />
      </div>
      <label>Product Name*
        <input type="text" name="name" required />
      </label>
      <label>Category
        <select name="category">
          <option value="">Select a category</option>
          <option value="premium-dine-in">Premium Dine-in</option>
          <option value="grocery">Grocery</option>
          <option value="deals">Deals</option>
        </select>
      </label>
      <label>Quantity
        <input type="number" name="quantity" min="0" value="0" />
      </label>
      <label>Price (USD)*
        <input type="number" name="price" step="0.01" min="0" required />
      </label>
      <label>Discount*
        <input type="number" name="discount" step="0.01" min="0" required />
      </label>
      <div class="row-2">
        <label>Pickup Starts
          <input type="datetime-local" name="pickup_start_time" />
        </label>
        <label>Pickup Ends
          <input type="datetime-local" name="pickup_end_time" />
        </label>
      </div>
      <label>Premium?
        <select name="is_premium">
          <option value="false" selected>No</option>
          <option value="true">Yes</option>
        </select>
      </label>
      <label>Enable today?
        <select name="enable_today">
          <option value="false" selected>No</option>
          <option value="true">Yes</option>
        </select>
      </label>
      <label>Description
        <textarea name="description" placeholder="Describe the product"></textarea>
      </label>
      <div class="actions">
        <button type="submit" class="btn">Create Product</button>
      </div>
      <div class="statusBox" id="statusBox"></div>
    </form>
  </div>

  <script>
    const imageUrlInput = document.querySelector('input[name="image_url"]');
    const imageFileInput = document.getElementById('image_file');
    const imagePreview = document.getElementById('imagePreview');
    const previewEmpty = document.getElementById('previewEmpty');
    const productForm = document.getElementById('productForm');

    function setPreview(src){
      if(!src){
        imagePreview.style.display='none';
        imagePreview.removeAttribute('src');
        previewEmpty.textContent='No image selected.';
        previewEmpty.style.display='block';
        return;
      }
      imagePreview.src=src;
      imagePreview.style.display='block';
      previewEmpty.style.display='none';
    }

    function updatePreview(){
      const file = imageFileInput.files && imageFileInput.files[0];
      if(file){ setPreview(URL.createObjectURL(file)); return; }
      const url = imageUrlInput.value.trim();
      setPreview(url || '');
    }

    imageUrlInput.addEventListener('input', updatePreview);
    imageFileInput.addEventListener('change', updatePreview);

    document.getElementById('productForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const status=document.getElementById('statusBox'); status.textContent='Saving...';
      status.style.color='';
      if(!productForm.reportValidity()){
        status.style.color='red';
        status.textContent='Please fill in all required fields before creating the product.';
        return;
      }
      const payload=new FormData(e.target);
      try {
        const res = await fetch('/vendor/products', { method:'POST', body: payload });
        const j=await res.json();
        if(j.success){ status.style.color='green'; status.textContent='Created successfully.'; e.target.reset(); setPreview(''); }
        else {
          const detailMessage = Array.isArray(j.details) && j.details.length ? j.details.map(detail => detail.message).join(' ') : '';
          status.style.color='red';
          status.textContent=detailMessage || j.error || 'Failed.';
          console.error(j);
        }
      } catch(err){ status.style.color='red'; status.textContent='Request failed.'; console.error(err); }
    });
  </script>
</body>
</html>
