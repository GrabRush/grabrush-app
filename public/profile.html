<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grabrush - Profile</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { max-width: 100% !important; margin: 0 !important; padding: 0 !important; background: #fff !important; }
    .profile-page { max-width: 980px; margin: 0 auto; padding: 20px 16px 80px; }
    .profile-header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .profile-card { border:1px solid #e0e0e0; border-radius:12px; padding:16px; background:#fff; }
    .profile-name { font-size:20px; font-weight:700; margin:0 0 6px; }
    .profile-subtitle { color:#666; margin:0; font-size:14px; }
    .section-title { font-size:16px; font-weight:700; margin:20px 0 10px; }
    .pill { display:inline-flex; align-items:center; gap:6px; background:#f5f5f5; border-radius:999px; padding:6px 10px; font-size:12px; color:#333; }
    .favorites-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
    .fav-card { border:1px solid #e0e0e0; border-radius:10px; padding:12px; background:#fff; }
    .fav-title { font-weight:600; margin:0 0 6px; }
    .fav-meta { color:#666; font-size:12px; margin:0; }
    .orders-list { display:flex; flex-direction:column; gap:10px; }
    .order-row { display:flex; justify-content:space-between; border:1px solid #e0e0e0; border-radius:10px; padding:12px; }
    .order-left { display:flex; flex-direction:column; gap:4px; }
    .order-id { font-weight:600; }
    .order-meta { color:#666; font-size:12px; }
  </style>
</head>
<body>
  <div class="profile-page">
    <div class="profile-header">
      <a href="/welcome" class="location-button">Back to Home</a>
    </div>

    <div class="profile-card">
      <div class="profile-name" id="profileName">User</div>
      <p class="profile-subtitle" id="profileSpend">Weekly spend: $0.00</p>
    </div>

    <div class="section-title">Favorites</div>
    <div class="favorites-grid" id="favoritesGrid"></div>
    <div id="favoritesEmpty" class="profile-subtitle" style="display:none;">No favorites yet.</div>

    <div class="section-title">Recent Orders</div>
    <div class="orders-list" id="ordersList"></div>
    <div id="ordersEmpty" class="profile-subtitle" style="display:none;">No recent orders.</div>
  </div>

  <script>
    async function loadProfile() {
      const res = await fetch('/api/profile-data');
      const data = await res.json();
      if (!data.success) return;

      document.getElementById('profileName').textContent = data.name || 'User';
      document.getElementById('profileSpend').textContent = `Weekly spend: $${Number(data.weeklySpend || 0).toFixed(2)}`;

      const favoritesGrid = document.getElementById('favoritesGrid');
      const favoritesEmpty = document.getElementById('favoritesEmpty');
      if (Array.isArray(data.favorites) && data.favorites.length) {
        favoritesGrid.innerHTML = data.favorites.map(fav => `
          <div class="fav-card">
            <div class="fav-title">${fav.name}</div>
            <div class="fav-meta">${fav.type || 'Vendor'} • ${fav.lat ? fav.lat.toFixed(2) : ''} ${fav.lng ? fav.lng.toFixed(2) : ''}</div>
          </div>
        `).join('');
      } else {
        favoritesEmpty.style.display = 'block';
      }

      const ordersList = document.getElementById('ordersList');
      const ordersEmpty = document.getElementById('ordersEmpty');
      if (Array.isArray(data.orders) && data.orders.length) {
        ordersList.innerHTML = data.orders.map(order => `
          <div class="order-row">
            <div class="order-left">
              <div class="order-id">Order #${order.id}</div>
              <div class="order-meta">${new Date(order.created_at).toLocaleDateString()} • ${order.status || 'placed'}</div>
            </div>
            <div class="order-right">$${Number(order.price || 0).toFixed(2)}</div>
          </div>
        `).join('');
      } else {
        ordersEmpty.style.display = 'block';
      }
    }

    loadProfile();
  </script>
</body>
</html>
