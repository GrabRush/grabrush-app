<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grabush - Forgot Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Grabush</h1>
    <div id="message"></div>
    <h2>Reset your password</h2>
    <p>Enter your email address and we'll send a reset link.</p>
    <form action="/forgot-password" method="POST">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>
      <button type="submit">Send Reset Link</button>
    </form>
    <div class="login-link">
      <p>Remembered your password?</p>
      <a href="/">Login</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const messageDiv = document.getElementById('message');
    if (params.get('sent') === 'true') {
      messageDiv.innerHTML = '<div class="success">Reset email sent. Please check your inbox.</div>';
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    const error = params.get('error');
    if (error) {
      messageDiv.innerHTML = '<div class="error">' + error + '</div>';
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  </script>
</body>
</html>
